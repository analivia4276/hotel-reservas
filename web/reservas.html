<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Hotel Reservas</div>
        <ul class="menu">
            <li><a href="index.html">Quartos</a></li>
            <li><a href="reservas.html" class="ativo">Reservas</a></li>
            <li><a href="#sobre">Sobre</a></li>
        </ul>
    </aside>

    <main class="conteudo">
        <div class="topo">
            <div>
                <h1>Reservas</h1>
                <p class="subtitulo">Gerencie as reservas do hotel</p>
            </div>
            <button class="btn" onclick="abrirCadastroReserva()">Nova Reserva</button>
        </div>

        <div class="card-area">
            <table>
                <thead>
                    <tr>
                        <th>Quarto</th>
                        <th>Hóspede</th>
                        <th>Entrada</th>
                        <th>Saída</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaReservas">
                </tbody>
            </table>
        </div>

        <p class="rodape">2024 Hotel Reservas - Projeto Full Stack</p>
    </main>

    <div id="cadastroReserva" class="fundo-modal oculto">
        <div class="form-area">
            <h2>Cadastro de Reserva</h2>
            <p class="subtitulo">Informe os dados da reserva</p>

            <form id="formReserva">
                <div class="campo">
                    <label>Quarto</label>
                    <select id="quartoReserva" required>
                        <option value="">Selecione o quarto</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Nome do Hóspede</label>
                    <input type="text" id="hospedeReserva" placeholder="Ex: João da Silva" required>
                </div>

                <div class="campo">
                    <label>Data de Entrada</label>
                    <input type="date" id="entradaReserva" required>
                </div>

                <div class="campo">
                    <label>Data de Saída</label>
                    <input type="date" id="saidaReserva" required>
                </div>

                <button type="submit" class="btn">Cadastrar Reserva</button>
                <button type="button" class="btn btn-secundario" onclick="fecharCadastroReserva()">Voltar</button>
            </form>
        </div>
    </div>

    <div id="modalExcluirReserva" class="fundo-modal oculto">
        <div class="modal">
            <h3>Excluir Reserva</h3>
            <p>Deseja realmente excluir esta reserva?</p>
            <div class="acoes">
                <button class="btn btn-secundario" onclick="fecharModalExcluirReserva()">Cancelar</button>
                <button class="btn btn-excluir" onclick="confirmarExclusaoReserva()">Excluir</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
